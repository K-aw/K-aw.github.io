    <section class="image-column">
      <!-- 1.jpg -->
      <img src="img/陈列/1.jpg" alt="老物件 1" />
      <div class="text-box">此场景还原了平津前线总前委在宋庄村的作战指挥室，墙上悬挂“全歼顽敌”锦旗与战役态势图，桌上摆放电话、地图与茶杯，
        真实再现了林彪、罗荣桓、聂荣臻等将领运筹帷幄、指挥千军万马的历史瞬间。</div>
      <!-- 2.jpg -->
      <img src="img/陈列/2.jpg" alt="老物件 2" />
      <div class="text-box">此物件为当时前线将士使用过的军用水壶，壶身印有“为人民服务”字样，
        体现了军队与人民的血肉联系。</div>
